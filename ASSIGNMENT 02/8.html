<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #fff;
        }
        h1 {
            font-size: 48px;
            font-weight: bold;
        }
        h2 {
            font-size: 20px;
            margin-top: -10px;
        }
        .donation-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
        }
        .donation-image {
            width: 100%;
            max-width: 800px;
        }
        .donation-options {
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: #165B33;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            text-align: center;
            padding: 20px;
        }
        .left {
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
        }
        .right {
            top: 50%;
            right: 10%;
            transform: translateY(-50%);
        }
        .donation-options button {
            margin-top: 10px;
            background-color: #D8BFD8;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
        .recognition {
            background-color: #165B33;
            color: white;
            padding: 15px;
            font-size: 18px;
            margin-top: -50px;
        }
    </style>
</head>
<body>
    <h1>DONATE</h1>
    <h2>TO SAVE WORLD</h2>
    
    <div class="donation-container">
        <img src="c:\Users\avane\OneDrive\Pictures\Saved Pictures\th (9).jpg" alt="Tree Image" class="donation-image">
        <div class="donation-options left">
            <p>Donation options for supporting Tree Planting</p>
            <button>CLICK</button>
        </div>
        <div class="donation-options right">
            <p>Donation options for supporting Forest Conservation</p>
            <button>CLICK</button>
        </div>
    </div>
    
    <div class="recognition">******Recognition for donors and sponsors****</div>
</body>
</html>
