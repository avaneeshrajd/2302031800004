    header {

        background: url('c:\Users\avane\OneDrive\Pictures\Saved Pictures\th (11).jpg') no-repeat center center/cover;

        align-items: center;
        justify-content: center;
        text-align: center;
        color: white;
        padding: 20px;
    }
    
    .hero-content {
        background: rgba(0, 0, 0, 0.6);
        padding: 30px;
        border-radius: 10px;
    }
    
    .hero h2 {
        font-size: 24px;
        color: #b4ff9f;
    }
    
    .hero h1 {
        font-size: 36px;
        margin: 10px 0;
    }
    
    .btn {
        display: inline-block;
        background: #7b4cd3;
        color: white;
        padding: 12px 20px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        margin-top: 15px;
    }
    
    .btn:hover {

</style>
