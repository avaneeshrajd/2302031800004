<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #A8E6CF, #42B883);
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 400px;
        }
        h1 {
            font-size: 36px;
            font-weight: bold;
        }
        .form-box {
            background-color: #006400;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }
        .form-box label {
            display: block;
            color: white;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .form-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            background-color: #D3D3D3;
            font-size: 16px;
        }
        .form-box input:focus {
            outline: none;
            background-color: #FFFFFF;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JOIN US</h1>
        <div class="form-box">
            <form>
                <label for="name">NAME</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">E-MAIL</label>
                <input type="email" id="email" name="email" required>
                
                <label for="city">CITY</label>
                <input type="text" id="city" name="city" required>
            </form>
        </div>
    </div>
</body>
</html>
